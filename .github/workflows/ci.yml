name: CropIQ CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: Lint & Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint source code
        run: npm run lint

      - name: Verify production build
        run: npm run build
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          NEXTAUTH_SECRET: temp-secret-for-build-verification
          NEXTAUTH_URL: https://crop-iq-mzes.vercel.app/
          GEMINI_API_KEY: temp-gemini-key
          GROQ_API_KEY: temp-groq-key
